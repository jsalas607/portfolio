name: Deploy al VPS

# Cada push a master (o disparo manual) actualiza el sitio en el servidor.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Evita despliegues pisándose si se hacen varios push seguidos.
concurrency:
  group: deploy-produccion
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@"$HOST" '
            set -e
            cd /root/portafolio
            git fetch --quiet origin master
            git reset --hard origin/master
            docker compose up -d --build
            docker image prune -f
          '
