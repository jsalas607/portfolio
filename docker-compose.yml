services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  # Servicio de auto-deploy: recibe el webhook de GitHub y reconstruye el sitio.
  webhook:
    build: ./deploy
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - DEPLOY_BRANCH=master
      - REPO_DIR=/repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/portafolio:/repo
      - webhook_state:/state

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - webhook
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  webhook_state:
